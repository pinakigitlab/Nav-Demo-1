name: Branch Promotion Policy

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  validate-branch-flow:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR source and target
        run: |
          echo "Source: ${{ github.head_ref }}"
          echo "Target: ${{ github.base_ref }}"

          if [[ "${{ github.base_ref }}" == "main" && "${{ github.head_ref }}" != "UAT" ]]; then
            echo "❌ Only UAT branch can merge into main"
            exit 1
          fi

          if [[ "${{ github.base_ref }}" == "UAT" && "${{ github.head_ref }}" != "Dev*" ]]; then
            echo "❌ Only dev branch can merge into uat"
            exit 1
          fi

          echo "✅ Branch flow validated"
